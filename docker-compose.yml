version: "3.9"

# Chibitek Labs Plugin Platform — Local Development Stack
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop all services
#   docker compose logs -f        # tail logs
#   docker compose ps             # status

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chibitek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chibitek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chibitek_local}
      POSTGRES_DB: ${POSTGRES_DB:-chibitek_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro  # optional: SQL init scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chibitek} -d ${POSTGRES_DB:-chibitek_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chibitek-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-chibitek_local}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-chibitek_local}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PGAdmin (optional, dev only) ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chibitek-pgadmin
    restart: unless-stopped
    profiles:
      - dev-tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chibitek.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis Commander (optional, dev only) ─────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: chibitek-redis-ui
    restart: unless-stopped
    profiles:
      - dev-tools
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-chibitek_local}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: chibitek-network
