name: Detailed Commit Notes

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  commit-summary:
    name: Post Commit Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate Diff Summary
        id: diff
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD)
          fi

          FILES_CHANGED=$(git diff --name-only $BEFORE $AFTER 2>/dev/null | head -50 | tr '\n' '\n')
          STAT=$(git diff --stat $BEFORE $AFTER 2>/dev/null | tail -1)
          ADDED=$(git diff --numstat $BEFORE $AFTER 2>/dev/null | awk '{add+=$1} END {print add}')
          REMOVED=$(git diff --numstat $BEFORE $AFTER 2>/dev/null | awk '{del+=$2} END {print del}')
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          AUTHOR=$(git log -1 --pretty=format:"%an")

          echo "files_changed<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "stat=$STAT" >> $GITHUB_OUTPUT
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "removed=$REMOVED" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT

      - name: Post Summary Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.diff.outputs.files_changed }}`;
            const stat = `${{ steps.diff.outputs.stat }}`;
            const added = `${{ steps.diff.outputs.added }}`;
            const removed = `${{ steps.diff.outputs.removed }}`;
            const commitMsg = `${{ steps.diff.outputs.commit_msg }}`;
            const author = `${{ steps.diff.outputs.author }}`;
            const sha = context.sha.substring(0, 7);

            const fileList = files.trim().split('\n').filter(f => f).map(f => `- \`${f}\``).join('\n');

            const body = [
              `## Commit Summary — \`${sha}\``,
              ``,
              `**Author:** ${author}`,
              `**Message:** ${commitMsg}`,
              ``,
              `### Changes`,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Lines added | +${added || 0} |`,
              `| Lines removed | -${removed || 0} |`,
              `| Summary | ${stat || 'No changes'} |`,
              ``,
              `### Files Modified`,
              fileList || '_No files changed_',
              ``,
              `---`,
              `_Auto-generated by Chibitek GitHub Automation_`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
